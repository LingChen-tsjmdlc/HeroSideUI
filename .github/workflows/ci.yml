name: CI

on:
  push:
    branches: [main, ci/test-pipeline]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # 测试：多平台 × 多版本
  # ============================================================
  test:
    name: Test | 测试 (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Install uv | 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python | 安装 Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Qt system deps | 安装 Qt 系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon0 libdbus-1-3

      - name: Install deps | 安装依赖
        run: uv sync

      - name: Install test deps | 安装测试依赖
        run: uv add --dev pytest pytest-qt

      - name: Run tests | 运行测试
        uses: coactions/setup-xvfb@v1
        with:
          run: uv run python -m pytest tests/ -v --tb=short

  # ============================================================
  # 语法检查
  # ============================================================
  lint:
    name: Lint | 语法检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Install uv | 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python | 安装 Python
        run: uv python install 3.11

      - name: Install deps | 安装依赖
        run: uv sync

      - name: Compile check | 编译检查
        run: |
          find hero_side_ui -name "*.py" -exec uv run python -m py_compile {} \;
          echo "所有文件编译通过 ✅"

  # ============================================================
  # 导入检查：确保包能正常导入，所有组件可用
  # ============================================================
  import-check:
    name: Import Check | 导入检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Install uv | 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python | 安装 Python
        run: uv python install 3.11

      - name: Install Qt system deps | 安装 Qt 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon0 libdbus-1-3

      - name: Install deps | 安装依赖
        run: uv sync

      - name: Import all components | 导入全部组件
        uses: coactions/setup-xvfb@v1
        with:
          run: >-
            uv run python -c
            "from hero_side_ui import Button, Accordion, AccordionItem;
            from hero_side_ui.themes import HEROUI_COLORS, RADIUS, FONT_FAMILY, BUTTON_SIZES, ACCORDION_SIZES;
            from hero_side_ui.utils import hex_to_rgba, load_svg_icon;
            from hero_side_ui.animation import RippleOverlay, PressScaleEffect, CollapseAnimation;
            print('All imports OK')"

  # ============================================================
  # 构建检查：确保能正常打包
  # ============================================================
  build:
    name: Build | 构建检查
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Install uv | 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python | 安装 Python
        run: uv python install 3.11

      - name: Build package | 构建包
        run: uv build

      - name: Check dist | 检查产物
        run: |
          ls -la dist/
          echo "构建产物生成成功 ✅"

      - name: Upload artifact | 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
