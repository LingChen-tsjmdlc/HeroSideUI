name: Publish to PyPI

# ========================================================================
# 发包流水线 — 通过 PyPI Trusted Publisher (OIDC) 发布，无需管理 Token。
#
# 触发方式:
#   1. 自动: 在 GitHub 网页发布一个 Release (推荐)
#      → 自动发到 **正式 PyPI** (https://pypi.org/)
#
#   2. 手动: 在 Actions 页面点 "Run workflow"
#      → 可选 target = testpypi / pypi，灵活试水
#
# 首次配置:
#   https://pypi.org/ 和 https://test.pypi.org/ 的项目 Settings → Publishing
#   → Add a new pending publisher，填:
#     - Owner: LingChen-tsjmdlc
#     - Repository name: HeroSideUI
#     - Workflow name: publish.yml
#     - Environment name: (pypi 填 pypi-release, testpypi 填 testpypi-release；
#                          也可以留空，留空时下面 environment: 段要删掉)
# ========================================================================

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "发到哪个 PyPI"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

jobs:
  # ============================================================
  # 构建 wheel + sdist
  # ============================================================
  build:
    name: Build | 构建包
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Install uv | 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python | 安装 Python
        run: uv python install 3.11

      - name: Build package | 构建 wheel + sdist
        run: |
          rm -rf dist/
          uv build
          ls -la dist/

      - name: Sanity check | 基础校验
        run: |
          # 确认 wheel 里包含 svg 资源文件（防止 resources 打包遗漏）
          python -m zipfile -l dist/*.whl | grep -E "resources/icons/.*\.svg" || (
            echo "❌ wheel 中未找到 svg 资源，打包配置有误！"
            exit 1
          )
          echo "✅ wheel 包含 svg 资源"

      - name: Upload dist | 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================================
  # 发布到 TestPyPI (手动触发 + target=testpypi)
  # ============================================================
  publish-testpypi:
    name: Publish | 发布到 TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi-release
      url: https://test.pypi.org/project/herosideui/
    permissions:
      id-token: write  # OIDC 必需
    steps:
      - name: Download dist | 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI | 发到 TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ============================================================
  # 发布到正式 PyPI (Release 触发 或 手动 target=pypi)
  # ============================================================
  publish-pypi:
    name: Publish | 发布到 PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi-release
      url: https://pypi.org/project/herosideui/
    permissions:
      id-token: write  # OIDC 必需
    steps:
      - name: Download dist | 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI | 发到正式 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
