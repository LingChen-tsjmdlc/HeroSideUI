repos:
  # ============================================================
  # 本地钩子
  # ============================================================
  # 注意: 版本号自动递增已移至 .git/hooks/post-commit，
  # 不再通过 pre-commit 框架管理（post-commit 阶段 + amend 方式）。

  # ============================================================
  # 标准钩子
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 尾部空白清理
      - id: trailing-whitespace
        name: Trailing Whitespace | 清理尾部空白
      # 文件末尾换行
      - id: end-of-file-fixer
        name: End of File | 文件末尾换行修复
      # YAML 语法检查
      - id: check-yaml
        name: Check YAML | YAML 语法检查
      # TOML 语法检查
      - id: check-toml
        name: Check TOML | TOML 语法检查
      # 大文件检查
      - id: check-added-large-files
        name: Large Files | 大文件检查
        args: ["--maxkb=500"]
      # 合并冲突标记检查
      - id: check-merge-conflict
        name: Merge Conflict | 合并冲突检查
